<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Delivery Exception Management Dashboard</title>
        <style>
            *{
                box-sizing: border-box;
                margin: 0;
                padding: 0;
                font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            }
            body
            {
                background-color: #fff;
                color: #222;
            } 
            .top-bar
            {
                background-color: #1f3b5c;
                color: #fff;
                padding: 16px 32px;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            .top-bar h1 { font-size: 20px; }
            .counters span
            {
                margin-left: 16px;
                font-size: 15px;
            }
            
            .layout
            {
                display: grid;
                grid-template-columns: 1.1fr 2fr;
                gap: 24px;
                padding: 24px 32px 32px;
            }
            
            .card
            {
                background-color: #fff;
                border-radius: 8px;
                padding: 20px 24px;
                box-shadow: 0 2px 6px rgba(0, 0, 0);
            }
            .card h2
            {
                font-size: 18px;
                margin-bottom: 16px;
            }
            
            .form-group { margin-bottom: 14px; }
            label
            {
                display: block;
                font-size: 14px;
                margin-bottom: 4px;
                color: #333;
            }
            .required
            {
                color: #d23030;
                margin-left: 2px;
            }
            input[type = "text"],
            select,
            textarea
            {
                width: 100%;
                padding: 8px 10px;
                font-size: 14px;
                border-radius: 4px;
                border: 1px solid #c0c9d9;
                outline: none;
                transition: border-color 0.2s ease , box-shadow 0.2s ease;
                background-color: #fdfdfd;
            }
            input[type = "text"]:focus,
            select:focus,
            textarea:focus
            {
                border-color: #2760d3;
                box-shadow: 0 0 0 2px rgba(51, 102, 204, 0.15);
            }
            fieldset.form-group
            {
                border: 1px solid #e1e6f0;
                border-radius: 4px;
                padding: 8px 10px 6px;
            }
            fieldset legend
            {
                padding: 0 4px;
                font-size: 13px;
            }
            fieldset label
            {
                display: inline-block;
                margin-right: 16px;
                font-size: 13px;
            }
            
            .btn
            {
                padding: 8px 14px;
                font-size: 14px;
                border-radius: 4px;
                border: 1px solid transparent;
                cursor: pointer;
                transition: background-color 0.15 ease , color 0.15 ease , border-color 0.15 ease , transform 0.05 ease;
            }
            .btn.primary
            {
                background-color: #2760d3;
                color: white;
            }
            .btn.primary:hover
            {
                background-color: #224b9d;
                transform: translateY(-1px);
            }
            .btn.resolve
            {
                background-color: #49ba4d;
                color: white;
            }
            .btn.resolve:hover:not(.disabled) { background-color: #39a43f; }
            .btn.delete
            {
                background-color: white;
                color: #ae2e20;
                border-color: #dea6a0;
            }
            .btn.delete:hover { background-color: #facac5; }
            .btn.disabled
            {
                opacity: 0.5;
                cursor: default;
            }
            
            .card-header
            {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 12px;
            }
            .filters
            {
                display: flex;
                gap: 16px;
            }
            .filter-group
            {
                display: flex;
                flex-direction: column;
            }
            .filter-group select { min-width: 160px; }
            
            .table-wrapper
            {
                border: 1px solid #e1e6f0;
                border-radius: 6px;
                overflow: hidden;
            }
            table
            {
                width: 100%;
                border-collapse: collapse;
                font-size: 14px;
            }
            thead { background-color: #f0f3f8; }
            thead th
            {
                text-align: left;
                padding: 10px 8px;
                color: #44566c;
                border-bottom: 1px solid #dfe4ee;
            }
            tbody td
            {
                padding: 8px;
                border-bottom: #f0f2f7;
            }
            tbody tr:nth-child(even) { background-color: #fafbff;}
            
            .status-badge
            {
                display: inline-block;
                padding: 2px 8px;
                border-radius: 10px;
                font-size: 12px;
            }
            .status-open
            {
                background-color: #fcedb5;
                color: #b18602;
            }
            .status-resolved
            {
                background-color: #c2f8d8;
                color: #46b54b;
            }
            .priority-low
            {
                background-color: #d0e7ff;
                color: #2760d3;
            }
            .priority-medium
            {
                background-color: #ffe4b5;
                color: #d2691e;
                font-weight: 500;
            }
            .priority-high
            {
                background-color: #f8d0d0;
                color: #ae2e20;
                font-weight: 600;
            }
            
            .row-resolved 
            { 
                background-color: #e6f9e8; 
                color: #777;
            }
            .row-resolved td { text-decoration: line-through; }
            
            .row-high { border-left: 4px solid #ae2e20; }
            
            @media (max-width: 900px)
            {
                .layout { grid-template-columns: 1fr; }
            }
        </style>
    </head>
    <body>
        <header class="top-bar">
            <h1>
                Delivery Exception Management Dashboard
            </h1>
            <div class="counters">
                <span>
                    Open:<strong id="open-count">0</strong>
                </span>
                <span>
                    Resolved:<strong id="resolved-count">0</strong>
                </span>
            </div>
        </header>
        <main class="layout">
            <section class="card">
                <h2>
                    Report Delivery Issue
                </h2>
                <form id="exception-form">
                    <div class="form-group">
                        <label for="delivery-id">Delivery ID
                            <span class="required">*</span>
                        </label>
                        <input type="text" id="delivery-id" required>
                    </div>
                    <div class="form-group">
                        <label for="customer-name">Customer Name
                            <span class="required">*</span>
                        </label>
                        <input type="text" id="customer-name" required>
                    </div>
                    <div class="form-group">
                        <label for="issue-type">Issue Type
                            <span class="required">*</span>
                        </label>
                        <select id="issue-type" required>
                            <option value=" ">Select issue type</option>
                            <option value="Address Not Found">Address Not Found</option>
                            <option value="Customer Not Available">Customer Not Available</option>
                            <option value="Payment Issue">Payment Issue</option>
                            <option value="Package Damaged">Package Damaged</option>
                        </select>
                    </div>
                    <fieldset class = "form-group">
                        <legend>Priority
                            <span class="required">*</span>
                        </legend>
                        <label>
                            <input type="radio" name="priority" value="Low">Low
                        </label>
                        <label>
                            <input type="radio" name="priority" value="Medium">Medium
                        </label>
                        <label>
                            <input type="radio" name="priority" value="High">High
                        </label>
                    </fieldset>
                    <div class="form-group">
                        <label for="notes">Notes</label>
                        <textarea id="notes"></textarea>
                    </div>
                    <button type="submit" class="btn primary">Submit Issue</button>
                </form>
            </section>
            <section class="card">
                <div class="card-header">
                    <h2>Exceptions Dashboard</h2>
                    <div class="filters">
                        <div class="filter-group">
                            <label for="filter-issue">Issue Type</label>
                            <select id="filter-issue">
                                <option value="All">All</option>
                                <option value="Address Not Found">Address Not Found</option>
                                <option value="Customer Not Available">Customer Not Available</option>
                                <option value="Payment Issue">Payment Issue</option>
                                <option value="Package Damaged">Package Damaged</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label for="filter-status">Status</label>
                            <select id="filter-status">
                                <option value="All">All</option>
                                <option value="Open">Open</option>
                                <option value="Resolved">Resolved</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Delivery ID</th>
                                <th>Customer Name</th>
                                <th>Issue Type</th>
                                <th>Priority</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="exceptions-table-body"></tbody>
                    </table>
                </div>
            </section>
        </main>   
        <script>
            document.addEventListener("DOMContentLoaded", function() {
            var issues = [];
            var form = document.querySelector("#exception-form");
            var tablebody = document.querySelector("#exceptions-table-body");
            var filterIssue = document.querySelector("#filter-issue");
            var filterStatus = document.querySelector("#filter-status");
            var openCountE1 = document.querySelector("#open-count");
            var resolvedCountE1 = document.querySelector("#resolved-count");
        
            function getSelectedPriority(){
                var radios = document.querySelectorAll('input[name="priority"]');
                for(var i = 0; i < radios.length; i++)
                    if(radios[i].checked)
                        return radios[i].value;
                return "";
            }
        
            function resetform(){    form.reset();    }
            function updateCounters(){
                var openCount = 0;
                var resolvedCount = 0;
                for(var i = 0; i < issues.length; i++){
                    if(issues[i].status === "open")
                        openCount++;
                    else
                        resolvedCount++;
                }
                openCountE1.textContent = openCount;
                resolvedCountE1.textContent = resolvedCount;
            }
        
            function createIssueRow(issue , index){
                var row = document.createElement("tr");
                row.setAttribute("data-index", index);
                if(issue.priority === "high"){
                    row.classList.add("row-high");
                }
                if(issue.status === "resolved"){
                    row.classList.add("row-resolved");
                }
        
                var Delivery = document.createElement("td");
                Delivery.textContent = issue.title;
                row.appendChild(Delivery);
        
                var Customer = document.createElement("td");
                Customer.textContent = issue.description;
                row.appendChild(Customer);
        
                var Issue = document.createElement("td");
                Issue.textContent = issue.type;
                row.appendChild(Issue);
        
                var Priority = document.createElement("td");
                Priority.textContent = issue.priority;
                Priority.classList.add(issue.priority === "high" ? "priority-high" : issue.priority === "medium" ? "priority-medium" : "priority-low");
                row.appendChild(Priority);
        
                var Status = document.createElement("td");
                var span = document.createElement("span");
                span.textContent = issue.status;
                span.classList.add("status-badge" , issue.status === "open" ? "status-open" : "status-resolved");
                Status.appendChild(span);
                row.appendChild(Status);
        
                var Action = document.createElement("td");
                var Resolve = document.createElement("button");
                Resolve.textContent = "Resolve";
                Resolve.classList.add("btn" , "resolve");
                Resolve.setAttribute("data-action", "resolve");
                Resolve.setAttribute("data-index", index);
                if(issue.status === "resolved"){
                    Resolve.disabled = true;
                }
                Action.appendChild(Resolve);
        
                var Delete = document.createElement("button");
                Delete.textContent = "Delete";
                Delete.classList.add("btn" , "delete");
                Delete.setAttribute("data-action", "delete");
                Delete.setAttribute("data-index", index);
                Delete.style.marginLeft = "8px";
                Action.appendChild(Delete);
                row.appendChild(Action);
                applyFiltersToRow(row , issue);
                return row;
            }
        
            function renderTable(){
                tablebody.innerHTML = "";
                for(var i = 0; i < issues.length; i++){
                    var row = createIssueRow(issues[i] , i);
                    tablebody.appendChild(row);
                }
                updateCounters();
            }
        
            function applyFiltersToRow(row , issue){
                var issueFilter = filterIssue.value;
                var statusFilter = filterStatus.value;
                var matchesIssue = issueFilter === "All" || issue.type === issueFilter;
                var matchesStatus = statusFilter === "All" || issue.status === statusFilter.toLowerCase();
                if(matchesIssue && matchesStatus){
                    row.style.display = "";
                } else {
                    row.style.display = "none";
                }
            }
        
            form.addEventListener("submit" , function(e){
                e.preventDefault();
                var Deliveryinput = document.querySelector("#delivery-id");
                var Customerinput = document.querySelector("#customer-name");
                var Issuetype = document.querySelector("#issue-type");
                var notesinput = document.querySelector("#notes");
                var Priority = getSelectedPriority();
        
                var Delivery = Deliveryinput.value.trim();
                var Customer = Customerinput.value.trim();
                var Issue = Issuetype.value.trim();
                var Notes = notesinput.value.trim();
        
                if(Delivery === "" || Customer === "" || Issue === "" || Priority === ""){
                    alert("Please fill in all required fields.");
                    return;
                }
                var newIssue = {
                    title: Delivery,
                    description: Customer,
                    type: Issue,
                    priority: Priority,
                    notes: Notes,
                    status: "open"
                };
                issues.push(newIssue);
                renderTable();
                resetform();
            });
        
            filterIssue.addEventListener("change" , function(){
                for(var i = 0; i < issues.length; i++){
                    var row = document.querySelector("tr[data-index='" + i + "']");
                    if(row){
                        applyFiltersToRow(row , issues[i]);
                    }
                }        
                renderTable();
            });
        
            filterStatus.addEventListener("change" , function(){
                for(var i = 0; i < issues.length; i++){
                    var row = document.querySelector("tr[data-index='" + i + "']");
                    if(row){
                        applyFiltersToRow(row , issues[i]);
                    }
                }
                renderTable();
            });
        
            document.addEventListener("click" , function(event){
                var target = event.target;
                if(target.tagName.toLowerCase() !== "button"){
                    return;
                }
                var action = target.getAttribute("data-action");
                var row = target.closest("tr");
                if(!row || !action){
                    return;
                }
                var index = parseInt(target.getAttribute("data-index") , 10);
                var issue = issues[index];
                if(action === "resolve"){
                    if(issue.status === "resolved"){
                        return;
                    }
                    issue.status = "resolved";
        
                    var statusCell = row.querySelector("td:nth-child(5) .status-badge");
                    statusCell.textContent = "resolved";
                    statusCell.classList.remove("status-open");
                    statusCell.classList.add("status-resolved");
        
                    row.classList.add("row-resolved");
        
                    target.classList.add("btn-disabled");
                    target.disabled = true;
                    applyFiltersToRow(row , issue);
                    updateCounters();
                } else if(action === "delete"){
                    var confirmDelete = confirm("Are you sure you want to delete this issue?");
                    if(!confirmDelete){
                        return;
                    }
                    issues.splice(index , 1);
                    renderTable();
                }
            });
        });
        </script>
    </body>
</html>
