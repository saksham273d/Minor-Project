<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Delivery Exception Management Dashboard</title>
        <style>
            *{
                box-sizing: border-box;
                margin: 0;
                padding: 0;
                font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            }
            body
            {
                background-color: #fff;
                color: #222;
            } 
            .top-bar
            {
                background-color: #1f3b5c;
                color: #fff;
                padding: 16px 32px;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            .top-bar h1 { font-size: 20px; }
            .counters span
            {
                margin-left: 16px;
                font-size: 15px;
            }
            
            .layout
            {
                display: grid;
                grid-template-columns: 1.1fr 2fr;
                gap: 24px;
                padding: 24px 32px 32px;
            }
            
            .card
            {
                background-color: #fff;
                border-radius: 8px;
                padding: 20px 24px;
                box-shadow: 0 2px 6px rgba(0, 0, 0);
            }
            .card h2
            {
                font-size: 18px;
                margin-bottom: 16px;
            }
            
            .form-group { margin-bottom: 14px; }
            label
            {
                display: block;
                font-size: 14px;
                margin-bottom: 4px;
                color: #333;
            }
            .required
            {
                color: #d23030;
                margin-left: 2px;
            }
            input[type = "text"],
            select,
            textarea
            {
                width: 100%;
                padding: 8px 10px;
                font-size: 14px;
                border-radius: 4px;
                border: 1px solid #c0c9d9;
                outline: none;
                transition: border-color 0.2s ease , box-shadow 0.2s ease;
                background-color: #fdfdfd;
            }
            input[type = "text"]:focus,
            select:focus,
            textarea:focus
            {
                border-color: #2760d3;
                box-shadow: 0 0 0 2px rgba(51, 102, 204, 0.15);
            }
            fieldset.form-group
            {
                border: 1px solid #e1e6f0;
                border-radius: 4px;
                padding: 8px 10px 6px;
            }
            fieldset legend
            {
                padding: 0 4px;
                font-size: 13px;
            }
            fieldset label
            {
                display: inline-block;
                margin-right: 16px;
                font-size: 13px;
            }
            
            .btn
            {
                padding: 8px 14px;
                font-size: 14px;
                border-radius: 4px;
                border: 1px solid transparent;
                cursor: pointer;
                transition: background-color 0.15 ease , color 0.15 ease , border-color 0.15 ease , transform 0.05 ease;
            }
            .btn.primary
            {
                background-color: #2760d3;
                color: white;
            }
            .btn.primary:hover
            {
                background-color: #224b9d;
                transform: translateY(-1px);
            }
            .btn.resolve
            {
                background-color: #49ba4d;
                color: white;
            }
            .btn.resolve:hover:not(.disabled) { background-color: #39a43f; }
            .btn.delete
            {
                background-color: white;
                color: #ae2e20;
                border-color: #dea6a0;
            }
            .btn.delete:hover { background-color: #facac5; }
            .btn.disabled
            {
                opacity: 0.5;
                cursor: default;
            }
            
            .card-header
            {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 12px;
            }
            .filters
            {
                display: flex;
                gap: 16px;
            }
            .filter-group
            {
                display: flex;
                flex-direction: column;
            }
            .filter-group select { min-width: 160px; }
            
            .table-wrapper
            {
                border: 1px solid #e1e6f0;
                border-radius: 6px;
                overflow: hidden;
            }
            table
            {
                width: 100%;
                border-collapse: collapse;
                font-size: 14px;
            }
            thead { background-color: #f0f3f8; }
            thead th
            {
                text-align: left;
                padding: 10px 8px;
                color: #44566c;
                border-bottom: 1px solid #dfe4ee;
            }
            tbody td
            {
                padding: 8px;
                border-bottom: #f0f2f7;
            }
            tbody tr:nth-child(even) { background-color: #fafbff;}
            
            .status-badge
            {
                display: inline-block;
                padding: 2px 8px;
                border-radius: 10px;
                font-size: 12px;
            }
            .status-open
            {
                background-color: #fcedb5;
                color: #b18602;
            }
            .status-resolved
            {
                background-color: #c2f8d8;
                color: #46b54b;
            }
            .priority-low
            {
                background-color: #d0e7ff;
                color: #2760d3;
            }
            .priority-medium
            {
                background-color: #ffe4b5;
                color: #d2691e;
                font-weight: 500;
            }
            .priority-high
            {
                background-color: #f8d0d0;
                color: #ae2e20;
                font-weight: 600;
            }
            
            .row-resolved 
            { 
                background-color: #e6f9e8; 
                color: #777;
            }
            .row-resolved td { text-decoration: line-through; }
            
            .row-high { border-left: 4px solid #ae2e20; }
            
            @media (max-width: 900px)
            {
                .layout { grid-template-columns: 1fr; }
            }
        </style>
    </head>
    <body>
        <header class="top-bar">
            <h1>
                Delivery Exception Management Dashboard
            </h1>
            <div class="counters">
                <span>
                    Open:<strong id="open-count">0</strong>
                </span>
                <span>
                    Resolved:<strong id="resolved-count">0</strong>
                </span>
            </div>
        </header>
        <main class="layout">
            <section class="card">
                <h2>
                    Report Delivery Issue
                </h2>
                <form id="exception-form">
                    <div class="form-group">
                        <label for="delivery-id">Delivery ID
                            <span class="required">*</span>
                        </label>
                        <input type="text" id="delivery-id" required>
                    </div>
                    <div class="form-group">
                        <label for="customer-name">Customer Name
                            <span class="required">*</span>
                        </label>
                        <input type="text" id="customer-name" required>
                    </div>
                    <div class="form-group">
                        <label for="issue-type">Issue Type
                            <span class="required">*</span>
                        </label>
                        <select id="issue-type" required>
                            <option value=" ">Select issue type</option>
                            <option value="Address Not Found">Address Not Found</option>
                            <option value="Customer Not Available">Customer Not Available</option>
                            <option value="Payment Issue">Payment Issue</option>
                            <option value="Package Damaged">Package Damaged</option>
                        </select>
                    </div>
                    <fieldset class = "form-group">
                        <legend>Priority
                            <span class="required">*</span>
                        </legend>
                        <label>
                            <input type="radio" name="priority" value="Low">Low
                        </label>
                        <label>
                            <input type="radio" name="priority" value="Medium">Medium
                        </label>
                        <label>
                            <input type="radio" name="priority" value="High">High
                        </label>
                    </fieldset>
                    <div class="form-group">
                        <label for="notes">Notes</label>
                        <textarea id="notes"></textarea>
                    </div>
                    <button type="submit" class="btn primary">Submit Issue</button>
                </form>
            </section>
            <section class="card">
                <div class="card-header">
                    <h2>Exceptions Dashboard</h2>
                    <div class="filters">
                        <div class="filter-group">
                            <label for="filter-issue">Issue Type</label>
                            <select id="filter-issue">
                                <option value="All">All</option>
                                <option value="Address Not Found">Address Not Found</option>
                                <option value="Customer Not Available">Customer Not Available</option>
                                <option value="Payment Issue">Payment Issue</option>
                                <option value="Package Damaged">Package Damaged</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label for="filter-status">Status</label>
                            <select id="filter-status">
                                <option value="All">All</option>
                                <option value="Open">Open</option>
                                <option value="Resolved">Resolved</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Delivery ID</th>
                                <th>Customer Name</th>
                                <th>Issue Type</th>
                                <th>Priority</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="exceptions-table-body"></tbody>
                    </table>
                </div>
            </section>
        </main>   
        <script defer src="script.js"></script>
    </body>
</html>
